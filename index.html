<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Trading Journal Manual</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>📊 Trading Journal Manual</h1>

    <div class="form">
      <input type="text" id="pair" placeholder="Pair (BTC/USD)">
      <input type="number" id="entry" placeholder="Entry Price">
      <input type="number" id="exit" placeholder="Exit Price">
      <input type="number" id="lot" placeholder="Lot">
      
      <select id="type">
        <option value="buy">BUY</option>
        <option value="sell">SELL</option>
      </select>

      <button onclick="addTrade()">Tambah Trade</button>
    </div>

    <h2>History Trade</h2>

    <table>
      <thead>
        <tr>
          <th>Pair</th>
          <th>Type</th>
          <th>Entry</th>
          <th>Exit</th>
          <th>Lot</th>
          <th>Profit</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="tradeList"></tbody>
    </table>

    <h2 id="totalProfit">Total Profit: 0</h2>
  </div>

  <script src="app.js"></script>
</body>
</html>
